{% extends 'base.html' %}

{% block title %}{{ section.title }}{% endblock %}

{% block content %}
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="row w-100">
        <div class="col-md-4 offset-md-4">
            <h2 class="text-center mb-4">Login</h2>
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                    <input type="text" name="{{ form.username.name }}" class="form-control" value="" placeholder="Username">
                </div>

                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
                    <input type="password" name="{{ form.password.name }}" class="form-control" value="" placeholder="Password">
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary" type="submit">Login</button>
                </div>
            </form>
            {% if error %}
                <div class="mt-3 text-danger text-center">
                    <strong>{{ error }}</strong>
                </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
